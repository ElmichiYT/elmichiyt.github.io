<!DOCTYPE html>
<html lang="es" class="transition-colors duration-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Blog Estático</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Clases personalizadas para inyectar estilos al Markdown renderizado */
        .prose h1 { font-size: 1.8rem; font-weight: bold; margin-bottom: 1rem; }
        .prose h2 { font-size: 1.4rem; font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.8rem; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        .prose code { background: rgba(148, 163, 184, 0.15); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        .prose pre { background: #0f172a; color: #f8fafc; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 1rem; font-family: monospace; }
        .html-dark .prose pre { background: #0d1117; }
        .prose img { max-width: 100%; border-radius: 8px; margin: 1.5rem 0; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-[#0d1117] dark:text-[#c9d1d9] min-h-screen font-sans antialiased transition-colors duration-200">

    <header class="border-b border-slate-200 dark:border-[#21262d] bg-white dark:bg-[#161b22] sticky top-0 z-50 transition-colors duration-200">
        <div class="max-w-4xl mx-auto px-4 h-16 flex justify-between items-center">
            <a href="." class="text-xl font-bold tracking-tight text-slate-900 dark:text-white flex items-center space-x-2">
                ⚡ <span class="hover:underline">DevBlog</span>
            </a>

            <button id="themeToggle" class="p-2 rounded-lg bg-slate-100 hover:bg-slate-200 dark:bg-[#21262d] dark:hover:bg-[#30363d] border border-slate-300 dark:border-[#30363d] text-lg transition duration-150" aria-label="Cambiar tema">
                🌓
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        
        <section id="feedSection" class="space-y-6">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 bg-white dark:bg-[#161b22] p-4 rounded-xl border border-slate-200 dark:border-[#21262d]">
                <div class="relative flex-1 max-w-md">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar por título o ID de 8 dígitos..." class="w-full bg-slate-50 dark:bg-[#0d1117] border border-slate-300 dark:border-[#30363d] rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 text-slate-900 dark:text-white">
                </div>
                <div class="text-sm font-medium text-slate-500 dark:text-[#8b949e]">
                    <span id="postsCount">Posts: 0</span> 
                </div>
            </div>

            <div id="postsContainer" class="space-y-4">
                <div class="text-center py-12 text-slate-400">Cargando publicaciones...</div>
            </div>
        </section>


        <section id="singlePostSection" class="hidden bg-white dark:bg-[#161b22] p-6 sm:p-8 rounded-xl border border-slate-200 dark:border-[#21262d] shadow-sm">
            <a href="." class="inline-flex items-center space-x-2 text-sm text-blue-600 dark:text-[#58a6ff] hover:underline mb-6 font-medium">
                <span>← Volver al inicio</span>
            </a>

            <article>
                <h1 id="postTitle" class="text-3xl sm:text-4xl font-extrabold text-slate-900 dark:text-white mb-2"></h1>
                <div id="postMeta" class="text-sm text-slate-500 dark:text-[#8b949e] border-b border-slate-200 dark:border-[#21262d] pb-4 mb-6"></div>
                
                <div id="postTags" class="flex flex-wrap gap-2 mb-6"></div>

                <div id="postBody" class="prose dark:prose-invert break-words text-slate-800 dark:text-[#c9d1d9]"></div>
            </article>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURACIÓN DE TU FIREBASE (Reemplaza con tus mismos datos de admin.html)
        const firebaseConfig = {
            apiKey: "AIzaSyCJGuCxeNseBRZiPrixcUfnqxBEJe0mbNw",
            authDomain: "elmichiyt-blogs.firebaseapp.com",
            projectId: "elmichiyt-blogs",
            storageBucket: "elmichiyt-blogs.firebasestorage.app",
            messagingSenderId: "315689247064",
            appId: "1:315689247064:web:bf5970046ff7ffa9bdc52d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Nodos del DOM
        const themeToggle = document.getElementById('themeToggle');
        const feedSection = document.getElementById('feedSection');
        const singlePostSection = document.getElementById('singlePostSection');
        const postsContainer = document.getElementById('postsContainer');
        const postsCount = document.getElementById('postsCount');
        const searchInput = document.getElementById('searchInput');

        // Estado local
        let todosLosPosts = [];

        // --- 1. MODO OSCURO AUTOMÁTICO Y MANUAL ---
        function inicializarTema() {
            const temaGuardado = localStorage.getItem('theme');
            const prefiereOscuro = window.matchMedia('(prefers-color-scheme: dark)').matches; [cite: 7]
            
            if (temaGuardado === 'dark' || (!temaGuardado && prefiereOscuro)) {
                document.documentElement.classList.add('html-dark', 'dark');
            } else {
                document.documentElement.classList.remove('html-dark', 'dark');
            }
        }

        themeToggle.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('html-dark', 'dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('html-dark', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });
        inicializarTema();


        // --- 2. CÁLCULO MATEMÁTICO DE TIEMPO RELATIVO (Ej: 25h = 1d, 1h) ---
        function obtenerTiempoRelativo(fechaISO) {
            const ahora = new Date();
            const fechaPost = new Date(fechaISO);
            let diferenciaSegundos = Math.floor((ahora - fechaPost) / 1000);

            if (diferenciaSegundos < 0) diferenciaSegundos = 0; // Evitar desfases raros por milisegundos

            // Unidades en segundos
            const unMinuto = 60;
            const unaHora = 3600;
            const unDia = 86400;
            const unaSemana = 604800;
            const unMes = 2592000; // Aprox 30 días
            const unAnio = 31536000;

            const años = Math.floor(diferenciaSegundos / unAnio);
            diferenciaSegundos %= unAnio;

            const meses = Math.floor(diferenciaSegundos / unMes);
            diferenciaSegundos %= unMes;

            const semanas = Math.floor(diferenciaSegundos / unaSemana);
            diferenciaSegundos %= unaSemana;

            const dias = Math.floor(diferenciaSegundos / unDia);
            diferenciaSegundos %= unDia;

            const horas = Math.floor(diferenciaSegundos / unaHora);
            diferenciaSegundos %= unaHora;

            const minutos = Math.floor(diferenciaSegundos / unMinuto);
            const segundos = diferenciaSegundos % unMinuto;

            // Lógica de "límites": Armar string dinámico mostrando las dos unidades más grandes disponibles 
            let partes = [];
            if (años > 0) partes.push(`${años}a`);
            if (meses > 0) partes.push(`${meses}m`);
            if (semanas > 0 && años == 0) partes.push(`${semanas}s`);
            if (dias > 0 && meses == 0) partes.push(`${dias}d`);
            if (horas > 0 && semanas == 0) partes.push(`${horas}h`); [cite: 4]
            if (minutos > 0 && dias == 0) partes.push(`${minutos}m`);
            if (segundos >= 0 && horas == 0 && partes.length < 2) partes.push(`${segundos}s`);

            // Tomar máximo los primeros 2 elementos del desglose para que quede limpio (Ej: 1d, 1h) 
            return partes.slice(0, 2).join(', ') || '0s';
        }

        // Formato estático de fecha (XX/XX/XXXX)
        function formatearFechaEstatica(fechaISO) {
            const d = new Date(fechaISO);
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`; [cite: 3]
        }


        // --- 3. PROCESADOR DE CONTENIDO PARA REEMPLAZAR BASE64 ---
        // Busca las etiquetas del Markdown y mapea los archivos Base64 correspondientes
        function procesarContenidoBase64(contenidoMarkdown, arrayArchivos) {
            let resultado = contenidoMarkdown;
            if (!arrayArchivos || arrayArchivos.length === 0) return resultado;

            arrayArchivos.forEach(archivo => {
                // Si es una foto inyectada en Markdown clásico: ![nombre](nombre)
                if (archivo.tipo.startsWith('image/')) {
                    const regexImagen = new RegExp(`!\\[${escapeRegExp(archivo.nombre)}\\]\\(${escapeRegExp(archivo.nombre)}\\)`, 'g');
                    resultado = resultado.replace(regexImagen, `![${archivo.nombre}](${archivo.data})`);
                } else if (archivo.tipo.startsWith('audio/')) {
                    // Si es un audio, cambiamos el texto por un reproductor HTML nativo
                    const targetTag = `[adjunto: ${archivo.nombre}]`;
                    const audioHtml = `<div class="my-4"><p class="text-xs text-slate-400 mb-1">🎵 ${archivo.nombre}</p><audio controls src="${archivo.data}" class="w-full max-w-md"></audio></div>`;
                    resultado = resultado.replace(targetTag, audioHtml);
                } else {
                    // Si es código u otro archivo, creamos un botón de descarga limpio
                    const targetTag = `[adjunto: ${archivo.nombre}]`;
                    const downloadHtml = `<div class="my-2"><a href="${archivo.data}" download="${archivo.nombre}" class="inline-flex items-center space-x-2 bg-slate-200 hover:bg-slate-300 dark:bg-[#21262d] dark:hover:bg-[#30363d] px-3 py-1.5 rounded-lg border border-slate-300 dark:border-[#30363d] text-xs font-semibold font-mono transition">📄 Descargar ${archivo.nombre}</a></div>`;
                    resultado = resultado.replace(targetTag, downloadHtml);
                }
            });
            return resultado;
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }


        // --- 4. CONTROLADOR DE RUTAS (SPA) ---
        async function router() {
            const urlParams = new URLSearchParams(window.location.search); [cite: 4]
            const postId = urlParams.get('post'); [cite: 4]

            if (postId) {
                // Mostrar un post específico
                feedSection.classList.add('hidden');
                singlePostSection.classList.remove('hidden');
                await cargarPostIndividual(postId);
            } else {
                // Mostrar feed general con todos los posts
                singlePostSection.classList.add('hidden');
                feedSection.classList.remove('hidden');
                await cargarFeedGeneral();
            }
        }


        // --- 5. CARGAR FEED GENERAL ---
        async function cargarFeedGeneral() {
            try {
                postsContainer.innerHTML = `<div class="text-center py-12 text-slate-400">Sincronizando con base de datos...</div>`;
                
                const querySnapshot = await getDocs(collection(db, "posts"));
                todosLosPosts = [];
                
                querySnapshot.forEach((doc) => {
                    todosLosPosts.push(doc.data());
                });

                // Ordenar por fecha de creación (más reciente primero)
                todosLosPosts.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

                // Actualizar contador global 
                postsCount.innerText = `Posts: ${todosLosPosts.length}`; [cite: 8, 9]

                renderizarTarjetas(todosLosPosts);

            } catch (err) {
                console.error(err);
                postsContainer.innerHTML = `<div class="text-center py-12 text-red-500">Error al leer las publicaciones de Firestore.</div>`;
            }
        }

        function renderizarTarjetas(lista) {
            if (lista.length === 0) {
                postsContainer.innerHTML = `<div class="text-center py-12 text-slate-400">No se encontraron posts.</div>`;
                return;
            }

            postsContainer.innerHTML = '';
            lista.forEach(post => {
                const tarjeta = document.createElement('div');
                tarjeta.className = "bg-white dark:bg-[#161b22] p-5 rounded-xl border border-slate-200 dark:border-[#21262d] shadow-sm hover:border-blue-500 dark:hover:border-blue-500 transition duration-150 flex flex-col justify-between gap-4";
                
                // Limitar el contenido en el feed para que no cargue todo el Markdown/Base64 largo de golpe
                const contenidoCorto = post.contenido.substring(0, 150) + (post.contenido.length > 150 ? '...' : '');

                let tagsHtml = post.tags ? post.tags.map(t => `<span class="bg-slate-100 dark:bg-[#1f6feb]/15 text-slate-600 dark:text-[#58a6ff] text-xs px-2 py-0.5 rounded-full border border-slate-200 dark:border-[#1f6feb]/30">${t}</span>`).join('') : '';

                tarjeta.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-1">
                            <a href="?post=${post.id}" class="text-xl font-bold text-slate-900 dark:text-white hover:text-blue-600 dark:hover:text-[#58a6ff] transition">${post.titulo}</a> 
                            <span class="text-[11px] font-mono bg-slate-100 dark:bg-[#21262d] text-slate-500 dark:text-[#8b949e] px-1.5 py-0.5 rounded border border-slate-200 dark:border-[#30363d]">#${post.id}</span> [cite: 5]
                        </div>
                        <div class="text-xs text-slate-400 dark:text-[#8b949e] mb-3">
                            Publicado el ${formatearFechaEstatica(post.fecha)} - hace ${obtenerTiempoRelativo(post.fecha)} 
                        </div>
                        <p class="text-sm text-slate-600 dark:text-[#8b949e] line-clamp-2">${contenidoCorto}</p>
                    </div>
                    <div class="flex flex-wrap gap-1.5">${tagsHtml}</div>
                `;
                postsContainer.appendChild(tarjeta);
            });
        }


        // --- 6. CARGAR POST INDIVIDUAL (?post=ID) --- 
        async function cargarPostIndividual(id) {
            try {
                const docRef = doc(db, "posts", id);
                const docSnap = await getDoc(docRef);

                if (!docSnap.exists()) {
                    document.getElementById('postTitle').innerText = "404 - Post No Encontrado";
                    document.getElementById('postBody').innerHTML = "<p>El ID solicitado no pertenece a ninguna publicación existente.</p>";
                    return;
                }

                const post = docSnap.data();

                // Pintar Título y Meta 
                document.getElementById('postTitle').innerText = post.titulo;
                document.getElementById('postMeta').innerText = `Publicado el ${formatearFechaEstatica(post.fecha)} - hace ${obtenerTiempoRelativo(post.fecha)}`; [cite: 3]
                
                // Pintar Tags
                const tagsContainer = document.getElementById('postTags');
                tagsContainer.innerHTML = '';
                if(post.tags) {
                    post.tags.forEach(t => {
                        const b = document.createElement('span');
                        b.className = "bg-blue-50 dark:bg-[#1f6feb]/15 text-blue-600 dark:text-[#58a6ff] text-xs px-2.5 py-1 rounded-full border border-blue-200 dark:border-[#1f6feb]/30 font-medium";
                        b.innerText = t;
                        tagsContainer.appendChild(b);
                    });
                }

                // Procesar la inyección de Base64 e interpretar Markdown
                const markdownListo = procesarContenidoBase64(post.contenido, post.archivos);
                document.getElementById('postBody').innerHTML = marked.parse(markdownListo);

            } catch (err) {
                console.error(err);
                document.getElementById('postBody').innerHTML = "<p class='text-red-500'>Error crítico al conectar con la base de datos.</p>";
            }
        }


        // --- 7. BUSCADOR EN TIEMPO REAL (Filtro local) --- 
        searchInput.addEventListener('input', (e) => {
            const busqueda = e.target.value.trim().toLowerCase();
            
            // Si no hay nada escrito, muestra todo
            if (!busqueda) {
                renderizarTarjetas(todosLosPosts);
                return;
            }

            // Filtrar por ID de 8 dígitos o por coincidencia en el título 
            const filtrados = todosLosPosts.filter(post => {
                return post.id.toString().includes(busqueda) || post.titulo.toLowerCase().includes(busqueda); [cite: 8]
            });

            renderizarTarjetas(filtrados);
        });


        // Ejecutar Router al cargar o al cambiar historial/atrás
        window.addEventListener('popstate', router);
        router();
    </script>
</body>
</html>
