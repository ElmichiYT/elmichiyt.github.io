<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Publicación (Estilo GitHub Release)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Estilos limpios para la vista previa de Markdown */
        .prose h1 { font-size: 1.8rem; font-weight: bold; margin-bottom: 1rem; color: #34d399; }
        .prose h2 { font-size: 1.4rem; font-weight: bold; margin-bottom: 0.8rem; }
        .prose p { margin-bottom: 1rem; color: #cbd5e1; }
        .prose code { background: #0f172a; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .prose pre { background: #0f172a; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 1rem; }
        .prose img { max-height: 250px; border-radius: 8px; margin: 1rem 0; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="bg-[#0d1117] text-[#c9d1d9] min-h-screen font-sans antialiased">

    <header class="border-b border-[#21262d] bg-[#161b22] p-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-3">
            <span class="text-xl font-semibold text-white">🚀 Post Releases Dashboard</span>
        </div>
        <div class="flex items-center space-x-2 bg-[#21262d] p-1.5 rounded-lg border border-[#30363d]">
            <input type="text" id="deleteIdInput" placeholder="ID de post a borrar" class="bg-[#0d1117] text-xs p-1.5 rounded border border-[#30363d] focus:outline-none focus:border-red-500 w-36">
            <button id="deletePostBtn" class="bg-red-900/40 hover:bg-red-700 text-red-200 text-xs font-semibold px-3 py-1.5 rounded border border-red-700 transition">
                🗑️ Borrar Post
            </button>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <section class="space-y-4 bg-[#161b22] p-6 rounded-xl border border-[#21262d]">
            <h2 class="text-lg font-medium text-white border-b border-[#21262d] pb-2">Editar Publicación</h2>
            
            <div>
                <label class="block text-xs font-semibold text-[#8b949e] uppercase mb-1">Título del Release / Post</label>
                <input type="text" id="postTitle" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-3 text-white focus:outline-none focus:border-[#58a6ff]" placeholder="Ej: v1.0.0 - Mi gran actualización">
            </div>

            <div>
                <label class="block text-xs font-semibold text-[#8b949e] uppercase mb-1">Etiquetas (Escribe y presiona Enter)</label>
                <div class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2 flex flex-wrap gap-2 items-center">
                    <div id="tagsList" class="flex flex-wrap gap-1.5"></div>
                    <input type="text" id="tagInput" class="bg-transparent focus:outline-none text-sm text-white flex-1 min-w-[120px]" placeholder="Añadir tag...">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-xs font-semibold text-[#8b949e] uppercase">Contenido del Post (Markdown)</label>
                    <span class="text-[11px] text-[#8b949e]">Acepta Ctrl+V para archivos</span>
                </div>
                <textarea id="postContent" rows="14" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-3 text-slate-200 font-mono text-sm focus:outline-none focus:border-[#58a6ff]" placeholder="# Describe los cambios...&#10;&#10;Puedes arrastrar texto o escribir Markdown puro."></textarea>
            </div>

            <div>
                <label class="inline-flex items-center justify-center px-4 py-2 bg-[#21262d] hover:bg-[#30363d] text-[#c9d1d9] text-xs font-medium rounded-lg border border-[#30363d] cursor-pointer transition">
                    📎 Adjuntar archivos (Fotos, Audios, Código...)
                    <input type="file" id="fileAttachmentInput" class="hidden" multiple>
                </label>
            </div>

            <div id="attachmentsWrapper" class="hidden">
                <p class="text-xs font-semibold text-[#8b949e] uppercase mb-2">Archivos cargados en Base64:</p>
                <div id="filesContainer" class="space-y-2 max-h-40 overflow-y-auto pr-2"></div>
            </div>

            <button id="publishBtn" class="w-full bg-[#238636] hover:bg-[#2ea043] text-white font-semibold py-3 rounded-lg text-sm shadow-md transition">
                🚀 Publicar Release
            </button>
        </section>


        <section class="bg-[#161b22] p-6 rounded-xl border border-[#21262d] flex flex-col">
            <div class="flex justify-between items-center border-b border-[#21262d] pb-2 mb-4">
                <h2 class="text-lg font-medium text-white">Vista Previa</h2>
                <span class="bg-[#21262d] text-[#8b949e] text-xs px-2 py-0.5 rounded border border-[#30363d]" id="idPlaceholder">ID: Generando...</span>
            </div>
            
            <div class="flex-1 overflow-y-auto max-h-[620px] bg-[#0d1117] p-5 rounded-lg border border-[#21262d]">
                <h1 id="previewTitle" class="text-2xl font-bold text-white mb-1">Título del Post</h1>
                <div id="previewMeta" class="text-xs text-[#8b949e] mb-4">Publicado hoy - hace 0 segundos</div>
                
                <div id="previewTags" class="flex flex-wrap gap-1.5 mb-4"></div>
                
                <div id="markdownRender" class="prose break-words"></div>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURACIÓN DE TU FIREBASE (Reemplaza con los tuyos)
        const firebaseConfig = {
            apiKey: "AIzaSyCJGuCxeNseBRZiPrixcUfnqxBEJe0mbNw",
            authDomain: "elmichiyt-blogs.firebaseapp.com",
            projectId: "elmichiyt-blogs",
            storageBucket: "elmichiyt-blogs.firebasestorage.app",
            messagingSenderId: "315689247064",
            appId: "1:315689247064:web:bf5970046ff7ffa9bdc52d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Nodos DOM
        const postTitle = document.getElementById('postTitle');
        const postContent = document.getElementById('postContent');
        const tagInput = document.getElementById('tagInput');
        const tagsList = document.getElementById('tagsList');
        const fileAttachmentInput = document.getElementById('fileAttachmentInput');
        const filesContainer = document.getElementById('filesContainer');
        const attachmentsWrapper = document.getElementById('attachmentsWrapper');
        const publishBtn = document.getElementById('publishBtn');
        const deletePostBtn = document.getElementById('deletePostBtn');
        const deleteIdInput = document.getElementById('deleteIdInput');

        // Nodos Preview
        const previewTitle = document.getElementById('previewTitle');
        const previewTags = document.getElementById('previewTags');
        const markdownRender = document.getElementById('markdownRender');

        // Estados Locales
        let tagsArray = [];
        let uploadedFiles = [];

        // --- 1. ACTUALIZACIÓN DE VISTA PREVIA EN TIEMPO REAL ---
        function updateLivePreview() {
            previewTitle.innerText = postTitle.value || 'Título del Post';
            // Marcamos las opciones básicas de marcado avanzado
            markdownRender.innerHTML = marked.parse(postContent.value || '*Sin contenido aún...*');
            
            // Render de tags en preview
            previewTags.innerHTML = '';
            tagsArray.forEach(tag => {
                const badge = document.createElement('span');
                badge.className = "bg-[#1f6feb]/15 text-[#58a6ff] text-xs px-2 py-0.5 rounded-full border border-[#1f6feb]/30";
                badge.innerText = tag;
                previewTags.appendChild(badge);
            });
        }
        postTitle.addEventListener('input', updateLivePreview);
        postContent.addEventListener('input', updateLivePreview);

        // --- 2. LOGICA DE TAGS (ESTILO RELEASES) ---
        tagInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && tagInput.value.trim() !== '') {
                e.preventDefault();
                const tag = tagInput.value.trim().toLowerCase();
                if (!tagsArray.includes(tag)) {
                    tagsArray.push(tag);
                    renderTags();
                    updateLivePreview();
                }
                tagInput.value = '';
            }
        });

        function renderTags() {
            tagsList.innerHTML = '';
            tagsArray.forEach((tag, index) => {
                const tagElement = document.createElement('span');
                tagElement.className = "bg-[#21262d] text-[#c9d1d9] text-xs px-2 py-1 rounded border border-[#30363d] flex items-center space-x-1";
                tagElement.innerHTML = `<span>${tag}</span><button type="button" class="text-red-400 hover:text-red-500 font-bold ml-1" data-index="${index}">&times;</button>`;
                
                tagElement.querySelector('button').addEventListener('click', (e) => {
                    const idx = e.target.getAttribute('data-index');
                    tagsArray.splice(idx, 1);
                    renderTags();
                    updateLivePreview();
                });
                tagsList.appendChild(tagElement);
            });
        }

        // --- 3. PROCESAMIENTO DE ARCHIVOS BASE64 (BOTÓN + CTRL+V) ---
        function processFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result;
                const fileId = `file_${Date.now()}_${Math.random().toString(36).substring(2, 5)}`;
                
                uploadedFiles.push({
                    id: fileId,
                    nombre: file.name,
                    tipo: file.type,
                    data: base64Data
                });

                renderAttachedFiles();

                // Auto-inyectar link o imagen en la posición del cursor del editor
                const cursor = postContent.selectionStart;
                const syntax = file.type.startsWith('image/') ? `![${file.name}](${file.name})\n` : `\n[adjunto: ${file.name}]\n`;
                postContent.value = postContent.value.substring(0, cursor) + syntax + postContent.value.substring(cursor);
                updateLivePreview();
            };
            reader.readAsDataURL(file); // Codifica a Base64 [cite: 2]
        }

        // Evento botón nativo
        fileAttachmentInput.addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(processFile);
        });

        // Evento pegar por Ctrl+V
        postContent.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.kind === 'file') {
                    processFile(item.getAsFile());
                }
            }
        });

        // RENDER DE ARCHIVOS ADJUNTOS CON OPCIÓN DE BORRAR [cite: 2]
        function renderAttachedFiles() {
            if (uploadedFiles.length === 0) {
                attachmentsWrapper.classList.add('hidden');
                return;
            }
            attachmentsWrapper.classList.remove('hidden');
            filesContainer.innerHTML = '';

            uploadedFiles.forEach((file) => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-[#0d1117] p-2 rounded border border-[#30363d] text-xs text-[#8b949e]";
                div.innerHTML = `
                    <span class="truncate max-w-[70%] text-slate-300">📁 ${file.nombre} (${(file.data.length/1024).toFixed(1)} KB)</span>
                    <button type="button" class="text-red-400 hover:bg-red-950/40 px-2 py-1 rounded" data-id="${file.id}">Remover</button>
                `;
                
                // Evento para borrar la imagen o archivo adjunto
                div.querySelector('button').addEventListener('click', (e) => {
                    const idToRemove = e.target.getAttribute('data-id');
                    // Lo sacamos del array global
                    uploadedFiles = uploadedFiles.filter(f => f.id !== idToRemove);
                    
                    // También removemos su texto del editor para limpiar el post
                    postContent.value = postContent.value.replace(`![${file.nombre}](${file.nombre})\n`, "");
                    postContent.value = postContent.value.replace(`\n[adjunto: ${file.nombre}]\n`, "");
                    
                    renderAttachedFiles();
                    updateLivePreview();
                });

                filesContainer.appendChild(div);
            });
        }

        // --- 4. ENGINE DE IDENTIFICADORES ÚNICOS (8 DÍGITOS) --- 
        function generarID8() {
            return Math.floor(11111111 + Math.random() * 88888888).toString(); // [cite: 6]
        }

        async function conseguirIDDisponible() {
            let id = generarID8();
            let docSnap = await getDoc(doc(db, "posts", id));
            while (docSnap.exists()) { // Si ya está ocupado, genera otro recursivamente [cite: 6, 7]
                id = generarID8();
                docSnap = await getDoc(doc(db, "posts", id));
            }
            return id;
        }

        // --- 5. GUARDAR POST (CREATE) ---
        publishBtn.addEventListener('click', async () => {
            if (!postTitle.value || !postContent.value) return alert("Por favor llena el título y contenido.");
            
            publishBtn.disabled = true;
            publishBtn.innerText = "Creando Commit en la DB...";

            try {
                const finalId = await conseguirIDDisponible();
                const cleanFiles = uploadedFiles.map(({nombre, tipo, data}) => ({nombre, tipo, data})); // quitar IDs temporales de la UI

                await setDoc(doc(db, "posts", finalId), {
                    id: finalId, // 
                    titulo: postTitle.value,
                    contenido: postContent.value,
                    tags: tagsArray,
                    archivos: cleanFiles, // Guardados nativamente en Base64 [cite: 2]
                    fecha: new Date().toISOString()
                });

                alert(`¡Post publicado exitosamente con el ID: ${finalId}!`);
                
                // Limpiar todo el Dashboard
                postTitle.value = ''; postContent.value = ''; tagsArray = []; uploadedFiles = [];
                renderTags(); renderAttachedFiles(); updateLivePreview();
            } catch (err) {
                console.error(err);
                alert("Error al subir el post.");
            } finally {
                publishBtn.disabled = false;
                publishBtn.innerText = "🚀 Publicar Release";
            }
        });

        // --- 6. BORRAR POST POR ID ---
        deletePostBtn.addEventListener('click', async () => {
            const idTarget = deleteIdInput.value.trim();
            if (!idTarget) return alert("Escribe un ID válido de 8 caracteres."); 

            if (confirm(`¿Estás seguro de que deseas eliminar permanentemente el post #${idTarget}?`)) {
                try {
                    const docRef = doc(db, "posts", idTarget);
                    const check = await getDoc(docRef);
                    if (!check.exists()) return alert("Ese ID de post no existe en la base de datos.");

                    await deleteDoc(docRef);
                    alert(`El post #${idTarget} fue borrado correctamente.`);
                    deleteIdInput.value = '';
                } catch (err) {
                    alert("No se pudo borrar el post.");
                    console.error(err);
                }
            }
        });
    </script>
</body>
</html>
