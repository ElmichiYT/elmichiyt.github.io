<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrapa la Arepa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2b2b2b;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            background-color: #1a1a1a;
            border: 4px solid #ffcc00;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
        }
        #scoreBoard {
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .controls {
            margin-top: 20px;
            font-size: 16px;
            color: #ccc;
            background: #333;
            padding: 10px 20px;
            border-radius: 8px;
        }
        span {
            color: white;
        }
    </style>
</head>
<body>

<div id="scoreBoard">Arepas: <span id="score">0</span></div>
<canvas id="gameCanvas" width="400" height="500"></canvas>
<div class="controls">🎮 Usa las <b>Flechas Izquierda</b> y <b>Derecha</b> para moverte. <br>⚠️ Esquiva los bloques rojos.</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    let score = 0;
    let isGameOver = false;

    // Tu personaje (la cesta/bandeja)
    const player = {
        x: 175,
        y: 450,
        width: 60,
        height: 15,
        speed: 8,
        dx: 0
    };

    const objects = [];

    function drawPlayer() {
        ctx.fillStyle = '#00aaff';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00aaff';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.shadowBlur = 0; // Reset
    }

    function drawObjects() {
        objects.forEach(obj => {
            ctx.beginPath();
            if (obj.type === 'arepa') {
                ctx.fillStyle = '#ffcc00'; // Amarillito como la harina
                ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
            } else {
                ctx.fillStyle = '#ff3333'; // Bloque rojo peligroso
                ctx.rect(obj.x - obj.radius, obj.y - obj.radius, obj.radius * 2, obj.radius * 2);
            }
            ctx.fill();
            ctx.closePath();
        });
    }

    function movePlayer() {
        player.x += player.dx;
        // Que no se salga de la pantalla, chamo
        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
    }

    function spawnObject() {
        if (Math.random() < 0.06) { 
            const type = Math.random() < 0.75 ? 'arepa' : 'piedra';
            objects.push({
                x: Math.random() * (canvas.width - 20) + 10,
                y: -20,
                radius: 12,
                speed: Math.random() * 3 + 2, // Velocidad loca
                type: type
            });
        }
    }

    function updateObjects() {
        for (let i = 0; i < objects.length; i++) {
            let obj = objects[i];
            obj.y += obj.speed;

            // ¡Colisión!
            if (obj.y + obj.radius > player.y &&
                obj.y - obj.radius < player.y + player.height &&
                obj.x + obj.radius > player.x &&
                obj.x - obj.radius < player.x + player.width) {

                if (obj.type === 'arepa') {
                    score += 10;
                    scoreElement.innerText = score;
                    objects.splice(i, 1);
                    i--;
                } else {
                    isGameOver = true;
                }
            }
            // Si se pasa de largo
            else if (obj.y > canvas.height) {
                objects.splice(i, 1);
                i--;
            }
        }
    }

    function drawGameOver() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#ff3333';
        ctx.font = 'bold 36px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('¡Te pelaste, mi pana!', canvas.width / 2, canvas.height / 2 - 30);
        
        ctx.fillStyle = 'white';
        ctx.font = '24px Arial';
        ctx.fillText('Puntaje total: ' + score, canvas.width / 2, canvas.height / 2 + 20);
        
        ctx.fillStyle = '#aaa';
        ctx.font = '16px Arial';
        ctx.fillText('Recarga la página para jugar otra vez', canvas.width / 2, canvas.height / 2 + 70);
    }

    function gameLoop() {
        if (isGameOver) {
            drawGameOver();
            return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        movePlayer();
        spawnObject();
        updateObjects();

        drawPlayer();
        drawObjects();

        requestAnimationFrame(gameLoop);
    }

    // Controles finos
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') player.dx = -player.speed;
        if (e.key === 'ArrowRight') player.dx = player.speed;
    });

    document.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') player.dx = 0;
    });

    // Arranca la partida
    gameLoop();
</script>
</body>
</html>
