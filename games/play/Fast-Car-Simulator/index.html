<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PS2 Retro Racer (Directo de Three.js)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: #00ff00; font-size: 20px; text-shadow: 2px 2px 0 #000; }
    </style>
</head>
<body>
    <div id="ui">Cargando... Presiona Click para iniciar</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/OBJLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/MTLLoader.js"></script>

<script>
    // --- Configuración y Optimización (Atom Friendly) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222); // Fondo oscuro
    // Niebla para rendimiento y look PS1
    scene.fog = new THREE.Fog(0x222222, 10, 60);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    // Cámara inicial para ver el carro
    camera.position.set(0, 4, 8); 

    const renderer = new THREE.WebGLRenderer({ antialias: false }); // ¡Antialias OFF!
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio > 1 ? 1 : window.devicePixelRatio); // Limitar píxeles
    document.body.appendChild(renderer.domElement);

    // --- Iluminación Sencilla ---
    scene.add(new THREE.AmbientLight(0xffffff, 0.7)); // Luz base fuerte
    const sun = new THREE.DirectionalLight(0xffffff, 0.6);
    sun.position.set(5, 10, 7);
    scene.add(sun);

    const loader = new THREE.OBJLoader();
    const mtlLoader = new THREE.MTLLoader();
    mtlLoader.setPath('assets/');

    // --- CARGAR TU MAPA ---
    let mapa;
    mtlLoader.load('mapa.mtl', (materials) => {
        materials.preload();
        loader.setMaterials(materials);
        loader.load('assets/mapa.obj', (object) => {
            mapa = object;
            // Opcional: Si usas textura pintada para el mapa, aplícala así:
            /*
            new THREE.TextureLoader().load('assets/mapa_tex.png', (texture) => {
                texture.magFilter = THREE.NearestFilter;
                texture.minFilter = THREE.NearestFilter;
                mapa.traverse((child) => { if (child.isMesh) child.material.map = texture; });
            });
            */
            scene.add(mapa);
            document.getElementById('ui').innerText = 'Mapa cargado. ¡Dale Click!';
        });
    });

    // --- CREAR EL CARRO BÁSICO (Frankenstein style) ---
    const carGroup = new THREE.Group(); // Objeto padre
    let chasis, llantasDelanteras, llantasTraseras;

    // Materiales Retro (Flat Shading)
    const chasisMaterial = new THREE.MeshLambertMaterial({ color: 0xff0000, flatShading: true }); // Rojo PS2
    const wheelMaterial = new THREE.MeshLambertMaterial({ color: 0x222222, flatShading: true });   // Gris oscuro

    // 1. Chasis (Un cubo alargado)
    const chasisGeo = new THREE.BoxGeometry(2, 0.8, 4); // Ancho, Alto, Largo
    chasis = new THREE.Mesh(chasisGeo, chasisMaterial);
    chasis.position.y = 0.6; // Un poco arriba del suelo
    chasis.name = 'chasis';
    carGroup.add(chasis);

    // 2. Llantas Delanteras (Grupo)
    llantasDelanteras = new THREE.Group();
    llantasDelanteras.name = 'llantas_delanteras';
    llantasDelanteras.position.set(0, 0.4, 1.5); // Centrado en X, Altura Y, Adelante Z
    carGroup.add(llantasDelanteras);

    const frontLeftGeo = new THREE.BoxGeometry(0.5, 0.8, 0.5); // Geometría de llanta (cubos)
    const frontLeft = new THREE.Mesh(frontLeftGeo, wheelMaterial);
    frontLeft.position.x = -1.25; // A la izquierda
    llantasDelanteras.add(frontLeft);

    const frontRight = new THREE.Mesh(frontLeftGeo, wheelMaterial);
    frontRight.position.x = 1.25; // A la derecha
    llantasDelanteras.add(frontRight);

    // 3. Llantas Traseras (Grupo)
    llantasTraseras = new THREE.Group();
    llantasTraseras.name = 'llantas_traseras';
    llantasTraseras.position.set(0, 0.4, -1.5); // Centrado en X, Altura Y, Atrás Z
    carGroup.add(llantasTraseras);

    const backLeftGeo = new THREE.BoxGeometry(0.5, 0.8, 0.5);
    const backLeft = new THREE.Mesh(backLeftGeo, wheelMaterial);
    backLeft.position.x = -1.25; // A la izquierda
    llantasTraseras.add(backLeft);

    const backRight = new THREE.Mesh(backLeftGeo, wheelMaterial);
    backRight.position.x = 1.25; // A la derecha
    llantasTraseras.add(backRight);

    // Posición inicial del carro en el mapa
    carGroup.position.y = 0.1; // Un pelín arriba para no parpadear con el suelo
    scene.add(carGroup);

    // --- Lógica de Juego y Controles ---
    let speed = 0, turnAngle = 0;
    const maxSpeed = 0.4, accel = 0.01, friction = 0.96, maxTurn = 0.03;
    const keys = { w: false, s: false, a: false, d: false };

    window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

    function animate() {
        requestAnimationFrame(animate);

        // Aceleración
        if (keys.w) speed += accel;
        if (keys.s) speed -= accel / 2;
        speed *= friction;
        // Limitar velocidad
        if (Math.abs(speed) > maxSpeed) speed = maxSpeed * Math.sign(speed);

        // Giro
        if (keys.a) turnAngle += 0.005;
        if (keys.d) turnAngle -= 0.005;
        turnAngle *= 0.9; // Volver al centro
        // Limitar ángulo de giro
        if (Math.abs(turnAngle) > maxTurn) turnAngle = maxTurn * Math.sign(turnAngle);

        // Aplicar Movimiento
        carGroup.rotation.y += turnAngle * (speed / maxSpeed); // El giro depende de la velocidad
        carGroup.translateZ(-speed);

        // --- ANIMAR LLANTAS (La Magia) ---
        if (llantasDelanteras && llantasTraseras) {
            const wheelRotation = speed * 1.5; // Qué tan rápido giran
            
            // Rodado (eje X)
            llantasDelanteras.traverse((child) => { if(child.isMesh) child.rotation.x -= wheelRotation; });
            llantasTraseras.traverse((child) => { if(child.isMesh) child.rotation.x -= wheelRotation; });

            // Giro de dirección (eje Y, solo delanteras)
            llantasDelanteras.rotation.y = turnAngle * 10; // Exagerar el giro visual
        }

        // --- CÁMARA ESTILO PS1 (Menos suave, más fija) ---
        const cameraOffset = new THREE.Vector3(0, 3, 7); // Arriba y atrás
        const carRotationMatrix = new THREE.Matrix4();
        carRotationMatrix.extractRotation(carGroup.matrix);
        cameraOffset.applyMatrix4(carRotationMatrix);
        
        // Posicionar cámara instantáneamente (sin suavizado)
        camera.position.copy(carGroup.position).add(cameraOffset);
        camera.lookAt(carGroup.position);

        renderer.render(scene, camera);
    }

    // Iniciar con un click (necesario para el navegador)
    window.addEventListener('click', () => {
        animate();
        document.getElementById('ui').innerText = '¡A correr! Usa WASD.';
    }, { once: true });

</script>
</body>
</html>
