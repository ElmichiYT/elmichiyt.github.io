<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Archivos en Firebase</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getStorage, ref, listAll, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // Tu configuración
        const firebaseConfig = {
            apiKey: "AIzaSyBmEI9UPEs3ST7vJVaqzq_PzWUMo1WaYzA",
            authDomain: "neon-dash-fac14.firebaseapp.com",
            projectId: "neon-dash-fac14",
            storageBucket: "neon-dash-fac14.firebasestorage.app",
            messagingSenderId: "1046802669155",
            appId: "1:1046802669155:web:b82655117ea092232c2256"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        async function listarArchivos() {
            const listaDiv = document.getElementById('lista-archivos');
            const storageRef = ref(storage, '/'); // Cambia '/' por una carpeta específica si la tienes

            try {
                const res = await listAll(storageRef);
                listaDiv.innerHTML = '';
                
                res.items.forEach(async (itemRef) => {
                    const url = await getDownloadURL(itemRef);
                    const link = document.createElement('a');
                    link.href = url;
                    link.textContent = itemRef.name;
                    link.target = "_blank";
                    link.style.display = "block";
                    listaDiv.appendChild(link);
                });
            } catch (error) {
                console.error("Error al obtener archivos:", error);
                listaDiv.textContent = "Error al cargar archivos.";
            }
        }

        window.onload = listarArchivos;
    </script>
</head>
<body>
    <h1>Mis Archivos en Firebase Storage</h1>
    <div id="lista-archivos">Cargando archivos...</div>
</body>
</html>
