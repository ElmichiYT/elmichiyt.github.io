<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElmichiYT Docs</title>
    <style>
        /* --- CONFIGURACIÓN DE COLORES Y DISEÑO --- */
        :root {
            --bg-principal: #f8fafc;
            --bg-sidebar: #ffffff;
            --texto-principal: #334155;
            --texto-muted: #64748b;
            --color-accento: #6366f1; /* Indigo moderno */
            --borde: #e2e8f0;
            --sidebar-width: 280px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- BARRA LATERAL (SIDEBAR) --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--borde);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-header {
            padding: 24px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--color-accento);
            border-bottom: 1px solid var(--borde);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header a {
            font-size: 0.85rem;
            color: var(--texto-muted);
            text-decoration: none;
            font-weight: 400;
            border: 1px solid var(--borde);
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .sidebar-header a:hover {
            background-color: #f1f5f9;
            color: #000;
        }

        .sidebar-menu {
            padding: 24px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .categoria-titulo {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--texto-muted);
            margin: 24px 0 8px 0;
            font-weight: 700;
        }

        .categoria-titulo:first-child {
            margin-top: 0;
        }

        .sidebar-menu ul {
            list-style: none;
        }

        .sidebar-menu a {
            display: block;
            padding: 8px 12px;
            color: var(--texto-principal);
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.95rem;
            margin-bottom: 4px;
            transition: all 0.2s ease;
        }

        .sidebar-menu a:hover {
            background-color: #f1f5f9;
            color: #000;
        }

        .sidebar-menu li.activo a {
            background-color: #e0e7ff;
            color: var(--color-accento);
            font-weight: 600;
        }

        /* --- ÁREA DE CONTENIDO PRINCIPAL --- */
        .contenido-principal {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 60px;
            display: flex;
            justify-content: center;
        }

        .articulo-contenedor {
            max-width: 820px;
            width: 100%;
            animation: fadeIn 0.2s ease;
        }

        /* --- ESTILOS PARA EL CONTENIDO DEL MARKDOWN --- */
        .articulo-contenedor h1 {
            font-size: 2.4rem;
            color: #0f172a;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--borde);
            padding-bottom: 8px;
        }

        .articulo-contenedor h2 {
            font-size: 1.7rem;
            color: #1e293b;
            margin: 32px 0 12px 0;
        }

        .articulo-contenedor p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #475569;
            margin-bottom: 16px;
        }

        .articulo-contenedor code {
            background-color: #f1f5f9;
            padding: 3px 6px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            color: #db2777;
        }

        .articulo-contenedor pre {
            background-color: #1e293b;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
        }

        .articulo-contenedor pre code {
            background-color: transparent;
            color: #f8fafc;
            padding: 0;
            font-size: 0.95rem;
        }

        .articulo-contenedor ul, .articulo-contenedor ol {
            margin-left: 24px;
            margin-bottom: 16px;
            color: #475569;
        }

        .articulo-contenedor li {
            margin-bottom: 6px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsivo rápido para móviles */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--borde); }
            .contenido-principal { padding: 24px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            📚 ElmichiYT Docs <a href="..">Volver</a>
        </div>
        <nav class="sidebar-menu" id="menu-lateral">
            </nav>
    </aside>

    <main class="contenido-principal">
        <div class="articulo-contenedor" id="contenido-doc">
            <p>Cargando...</p>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

    <script>
        const menuLateral = document.getElementById('menu-lateral');
        const contenedorContenido = document.getElementById('contenido-doc');

        // --- 1. FUNCIÓN PARA CARGAR Y RENDERIZAR UN ARCHIVO .MD ---
        function cargarMarkdown(ruta, nombreHash = null) {
            fetch(ruta)
                .then(res => {
                    if (!res.ok) throw new Error(`No se pudo leer el archivo en la ruta: ${ruta}`);
                    return res.text();
                })
                .then(markdownCrudo => {
                    contenedorContenido.innerHTML = marked.parse(markdownCrudo);
                    
                    // Manejo visual de la selección basándonos en el nombre que está en el Hash
                    document.querySelectorAll('.menu-item').forEach(li => li.classList.remove('activo'));
                    
                    if (nombreHash) {
                        const itemActivo = document.querySelector(`[data-hash="${nombreHash}"]`);
                        if (itemActivo) itemActivo.classList.add('activo');
                    }
                    
                    document.querySelector('.contenido-principal').scrollTop = 0;
                })
                .catch(err => {
                    contenedorContenido.innerHTML = `<h1>Error 404</h1><p>No se pudo cargar la página.</p>`;
                });
        }

        // --- 2. EVALUAR LA URL ACTUAL (Detección del Hash) ---
        function procesarRutaActual() {
            // Obtenemos lo que está después del '#' (ej: #help.md o #main.md)
            // Quitamos el '#' usando replace
            let hash = window.location.hash.replace('#', '');
            
            if (!hash) {
                // Si entran a la página limpia sin hash, cargamos main.md por defecto
                cargarMarkdown('pages/main.md', 'main.md');
            } else {
                // Si entran con un hash (ej: #help.md), cargamos esa ruta directa
                cargarMarkdown(`pages/${hash}`, hash);
            }
        }

        // --- 3. CARGAR EL MENÚ LATERAL DESDE EL ARCHIVO CONFIGURACIÓN JSON ---
        fetch('pages.json')
            .then(response => {
                if (!response.ok) throw new Error("No se encontró el archivo pages.json");
                return response.json();
            })
            .then(estructura => {
                let htmlMenu = '';

                Object.keys(estructura).forEach(categoria => {
                    htmlMenu += `<div class="categoria-titulo">${categoria}</div><ul>`;
                    
                    estructura[categoria].forEach(rutaArchivo => {
                        const nombreBase = rutaArchivo.split('/').pop().replace(/\.(md|html)$/i, '');
                        const nombreFormateado = nombreBase.replace(/[-_]/g, ' ').trim();
                        const nombreMenu = nombreFormateado.charAt(0).toUpperCase() + nombreFormateado.slice(1);
                        
                        // Guardamos la ruta en un atributo personalizado para que el clic lo use en el Hash
                        htmlMenu += `
                            <li class="menu-item" data-hash="${rutaArchivo}">
                                <a href="#${rutaArchivo}">${nombreMenu}</a>
                            </li>
                        `;
                    });
                    htmlMenu += '</ul>';
                });
                menuLateral.innerHTML = htmlMenu;

                // Ejecutamos la carga inicial una vez que el menú esté listo en el HTML
                procesarRutaActual();
            })
            .catch(error => {
                console.error("Error al construir el menú lateral:", error);
            });

        // --- 4. ESCUCHAR CUANDO CAMBIE EL HASH DE LA URL (Súper importante) ---
        // Esto detecta si el usuario le da clic a los enlaces creados arriba o va atrás/adelante en el navegador
        window.addEventListener('hashchange', procesarRutaActual);
    </script>
</body>
</html>
