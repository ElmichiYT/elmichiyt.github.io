<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElmichiYT Docs</title>
    <style>
        /* --- CONFIGURACIÓN DE COLORES Y DISEÑO --- */
        :root {
            --bg-principal: #f8fafc;
            --bg-sidebar: #ffffff;
            --texto-principal: #334155;
            --texto-muted: #64748b;
            --color-accento: #6366f1; /* Indigo moderno */
            --borde: #e2e8f0;
            --sidebar-width: 280px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- BARRA LATERAL (SIDEBAR) --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--borde);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-header {
            padding: 24px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--color-accento);
            border-bottom: 1px solid var(--borde);
        }

        .sidebar-menu {
            padding: 24px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .categoria-titulo {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--texto-muted);
            margin: 24px 0 8px 0;
            font-weight: 700;
        }

        .categoria-titulo:first-child {
            margin-top: 0;
        }

        .sidebar-menu ul {
            list-style: none;
        }

        .sidebar-menu a {
            display: block;
            padding: 8px 12px;
            color: var(--texto-principal);
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.95rem;
            margin-bottom: 4px;
            transition: all 0.2s ease;
        }

        .sidebar-menu a:hover {
            background-color: #f1f5f9;
            color: #000;
        }

        .sidebar-menu li.activo a {
            background-color: #e0e7ff;
            color: var(--color-accento);
            font-weight: 600;
        }

        /* --- ÁREA DE CONTENIDO PRINCIPAL --- */
        .contenido-principal {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 60px;
            display: flex;
            justify-content: center;
        }

        .articulo-contenedor {
            max-width: 820px;
            width: 100%;
            animation: fadeIn 0.2s ease;
        }

        /* --- ESTILOS PARA EL CONTENIDO DEL MARKDOWN --- */
        .articulo-contenedor h1 {
            font-size: 2.4rem;
            color: #0f172a;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--borde);
            padding-bottom: 8px;
        }

        .articulo-contenedor h2 {
            font-size: 1.7rem;
            color: #1e293b;
            margin: 32px 0 12px 0;
        }

        .articulo-contenedor p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #475569;
            margin-bottom: 16px;
        }

        .articulo-contenedor code {
            background-color: #f1f5f9;
            padding: 3px 6px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            color: #db2777; /* Rosa para código en línea */
        }

        .articulo-contenedor pre {
            background-color: #1e293b;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
        }

        .articulo-contenedor pre code {
            background-color: transparent;
            color: #f8fafc;
            padding: 0;
            font-size: 0.95rem;
        }

        .articulo-contenedor ul, .articulo-contenedor ol {
            margin-left: 24px;
            margin-bottom: 16px;
            color: #475569;
        }

        .articulo-contenedor li {
            margin-bottom: 6px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsivo rápido para móviles */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--borde); }
            .contenido-principal { padding: 24px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            📚 ElmichiYT Docs
        </div>
        <nav class="sidebar-menu" id="menu-lateral">
            </nav>
    </aside>

    <main class="contenido-principal">
        <div class="articulo-contenedor" id="contenido-doc">
            <p>Cargando...</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        const menuLateral = document.getElementById('menu-lateral');
        const contenedorContenido = document.getElementById('contenido-doc');

        // --- 1. FUNCIÓN PARA CARGAR Y RENDERIZAR UN ARCHIVO .MD ---
        function cargarMarkdown(ruta, elementoMenu = null) {
            fetch(ruta)
                .then(res => {
                    if (!res.ok) throw new Error(`No se pudo leer el archivo en la ruta: ${ruta}`);
                    return res.text();
                })
                .then(markdownCrudo => {
                    // Traducir Markdown a HTML real
                    contenedorContenido.innerHTML = marked.parse(markdownCrudo);
                    
                    // Manejo visual de la selección en el menú lateral
                    document.querySelectorAll('.menu-item').forEach(li => li.classList.remove('activo'));
                    if (elementoMenu) {
                        elementoMenu.classList.add('activo');
                    }
                    
                    // Resetear el scroll del artículo al inicio
                    document.querySelector('.contenido-principal').scrollTop = 0;
                })
                .catch(err => {
                    contenedorContenido.innerHTML = `<h1>Error 404</h1><p>No se pudo cargar la página.</p>`;
                });
        }

        // --- 2. ACCIÓN INMEDIATA: Cargar main.md al entrar a la web ---
        cargarMarkdown('pages/main.md');

        // --- 3. CARGAR EL MENÚ LATERAL DESDE EL ARCHIVO CONFIGURACIÓN JSON ---
        fetch('./pages.json')
            .then(response => {
                if (!response.ok) throw new Error("No se encontró el archivo lista-paginas.json");
                return response.json();
            })
            .then(estructura => {
                let htmlMenu = '';

                Object.keys(estructura).forEach(categoria => {
                    htmlMenu += `<div class="categoria-titulo">${categoria}</div><ul>`;
                    
                    estructura[categoria].forEach(rutaArchivo => {
                        // Extraer solo el nombre del archivo (quita carpetas y el ".md")
                        const nombreBase = rutaArchivo.split('/').pop().replace('.md', '');
                        
                        // Formatear estéticamente (ej: "mi-guia-rapida" -> "Mi guia rapida")
                        const nombreFormateado = nombreBase.replace(/[-_]/g, ' ').trim();
                        const nombreMenu = nombreFormateado.charAt(0).toUpperCase() + nombreFormateado.slice(1);
                        
                        const rutaCompleta = `pages/${rutaArchivo}`;

                        htmlMenu += `
                            <li class="menu-item" data-ruta="${rutaCompleta}">
                                <a href="#">${nombreMenu}</a>
                            </li>
                        `;
                    });
                    htmlMenu += '</ul>';
                });
                menuLateral.innerHTML = htmlMenu;

                // Si 'main.md' está listado en tu JSON, se ilumina automáticamente
                const itemMain = document.querySelector(`[data-ruta="pages/main.md"]`);
                if (itemMain) {
                    itemMain.classList.add('activo');
                }
            })
            .catch(error => {
                console.error("Error al construir el menú lateral:", error);
            });

        // --- 4. ESCUCHAR LOS CLICS EN EL MENÚ LATERAL ---
        menuLateral.addEventListener('click', (e) => {
            const item = e.target.closest('.menu-item');
            if (!item) return;
            e.preventDefault(); // Evita saltos raros en la página
            
            cargarMarkdown(item.getAttribute('data-ruta'), item);
        });
    </script>
</body>
</html>
