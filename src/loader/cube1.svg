<br><br><br>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="50">
  <defs>
    <rect id="cube" width="10" height="10" rx="1" fill="#FFFFFF" />
  </defs>

  <g transform="translate(0, 15)">
    
    <g transform="translate(20, 0)">
      <use href="#cube" x="-5" y="-5"/>
      <animateTransform
        attributeName="transform"
        type="translate"
        values="20 0; 20 -15; 20 0"
        keyTimes="0; 0.5; 1"
        dur="1s"
        begin="0s"
        calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
        repeatCount="indefinite"
      />
    </g>

    <g transform="translate(60, 0)">
      <use href="#cube" x="-5" y="-5"/>
      <animateTransform
        attributeName="transform"
        type="translate"
        values="60 0; 60 -15; 60 0"
        keyTimes="0; 0.5; 1"
        dur="1s"
        begin="0.15s"
        calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
        repeatCount="indefinite"
      />
    </g>

    <g transform="translate(100, 0)">
      <use href="#cube" x="-5" y="-5"/>
      <animateTransform
        attributeName="transform"
        type="translate"
        values="100 0; 100 -15; 100 0"
        keyTimes="0; 0.5; 1"
        dur="1s"
        begin="0.30s"
        calcMode="spline"
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"
        repeatCount="indefinite"
      />
    </g>
  </g>
</svg>
