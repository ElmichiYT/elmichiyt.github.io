<!DOCTYPE html>
<html lang="es">
<head>
  <title>Directorio de paquetes</title>
  <meta charset="UTF-8">
</head>
<body>
  <h1>/src/pkg/</h1>
  <p>
    No puedes ver los paquetes aquí.
    Pero puedes acceder a ellos desde URL.
    Por ejemplo:
  </p>
  <small>/src/pkg/index.html</small>
  <p>
    Dicha URL te envía al archivo que estás viendo
    ahora mismo. Aunque verías lo mismo que estás
    viendo ahora, pero en la URL agregaría un
    "\index.html".
  </p>
</body>
</html>
