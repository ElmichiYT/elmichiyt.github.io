<svg width="512" height="512" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
  <circle 
    cx="25" 
    cy="25" 
    r="20" 
    stroke="#3498db" 
    stroke-width="5" 
    fill="none" 
    stroke-linecap="round"
    stroke-dasharray="90" 
    stroke-dashoffset="60">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 25 25" 
      to="360 25 25" 
      dur="1s" 
      repeatCount="indefinite" />
  </circle>
</svg>
