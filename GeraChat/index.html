<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GeraChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-layer">
        <div id="menu-inicio" class="screen active">
            <img src="logo.png" alt="Logo" class="logo">
            <div class="button-group">
                <button onclick="navegar('inicio', 'jugar-pre')">Jugar</button>
                <button onclick="navegar('inicio', 'config')">Configuración</button>
                <button onclick="navegar('inicio', 'creditos')">Créditos</button>
				<br>
				<small>Versión: 1.1 Test Update #3</small>
            </div>
        </div>
        <div id="menu-jugar-pre" class="screen center-screen">
            <h2>Configura tu Avatar</h2>
            <input type="text" id="username" placeholder="Tu nombre...">
            <div class="skin-select">
                <label>Color:</label>
                <input type="color" id="skinColor" value="#3498db">
            </div>
            <button id="btn-unirse">Unirse</button>
            <button class="back-btn" onclick="navegar('jugar-pre', 'inicio')">Volver</button>
            <p id="error-msg" style="color: #e74c3c;"></p>
        </div>
        <div id="menu-config" class="screen">
            <h2>Configuración</h2>
            <div class="option">
                <label>Volumen: <span id="volVal">50%</span></label>
                <input type="range" id="vol-slider" min="0" max="100" value="50">
            </div>
            <button class="back-btn" onclick="navegar('config', 'inicio')">Volver</button>
        </div>
        <div id="menu-creditos" class="screen">
            <h2>Créditos</h2>
            <div id="lista-creditos">
                <p><b>Creador:</b> ElmichiYT</p>
                <p><b>Servidor:</b> Firebase Realtime</p>
            </div>
            <button class="back-btn" onclick="navegar('creditos', 'inicio')">Volver</button>
        </div>
        <div id="loading-screen" class="screen-overlay">
            <div class="loading-content">
                <h1 id="loading-msg">Iniciando...</h1>
                <div class="progress-bar-container"><div id="progress-bar"></div></div>
            </div>
        </div>
    </div>

    <div id="game-container" style="display:none;">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="game-ui">
            <div id="chat-display"></div>
            <input type="text" id="chat-input" placeholder="Escribe aquí...">
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
