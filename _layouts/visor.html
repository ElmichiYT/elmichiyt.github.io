<!-- _layouts/visor.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>
    <style>
        body {
            margin: 0; background: #121212; color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; height: 100vh;
            font-family: system-ui, sans-serif;
        }
        .media-container { max-width: 90vw; max-height: 80vh; }
        img, video { max-width: 100%; max-height: 80vh; border-radius: 8px; }
        h1 { font-size: 1.2rem; margin-top: 15px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="media-container">
        {% if page.tipo == "video" %}
            <video src="{{ page.archivo }}" controls autoplay></video>
        {% else %}
            <img src="{{ page.archivo }}" alt="{{ page.title }}">
        {% endif %}
    </div>
    
    <h1>{{ page.title }}</h1>

</body>
</html>
