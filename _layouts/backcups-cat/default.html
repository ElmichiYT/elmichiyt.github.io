<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'es-MX' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <!-- Contenedor oficial del tema Primer para mantener el diseño de las fuentes y tablas -->
    <div class="container-lg px-3 my-5 markdown-body">
      
      <!-- Únicamente se renderizará el texto que tú escribas en tu archivo .md -->
      {{ content }}
      
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js" integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
    <script>anchors.add();</script>
  </body>
</html>
