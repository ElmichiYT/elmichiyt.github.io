<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'es' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0d1117;
            }
        }

        /* Contenedor principal que limita el ancho al estilo documentación de GitHub */
        .wrapper {
            max-width: 1012px;
            margin: 0 auto;
        }

        /* --- ESTILOS PARA LAS ALERTAS CON TUS SVGS --- */
        .markdown-body .markdown-alert {
            padding: 12px 16px;
            margin-bottom: 16px;
            border-left: .25em solid #d0d7de;
            background-color: transparent;
        }
        .markdown-body .markdown-alert-title {
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            line-height: 1;
            margin-bottom: 6px;
            margin-top: 0;
        }

        /* Variaciones de Color oficiales basadas en tus iconos */
        .markdown-body .markdown-alert.markdown-alert-note { border-left-color: #0969da; }
        .markdown-body .markdown-alert.markdown-alert-note .markdown-alert-title { color: #0969da; }
        
        .markdown-body .markdown-alert.markdown-alert-tip { border-left-color: #1a7f37; }
        .markdown-body .markdown-alert.markdown-alert-tip .markdown-alert-title { color: #1a7f37; }
        
        .markdown-body .markdown-alert.markdown-alert-important { border-left-color: #8250df; }
        .markdown-body .markdown-alert.markdown-alert-important .markdown-alert-title { color: #8250df; }
        
        .markdown-body .markdown-alert.markdown-alert-warning { border-left-color: #9a6700; }
        .markdown-body .markdown-alert.markdown-alert-warning .markdown-alert-title { color: #9a6700; }
        
        .markdown-body .markdown-alert.markdown-alert-caution { border-left-color: #cf222e; }
        .markdown-body .markdown-alert.markdown-alert-caution .markdown-alert-title { color: #cf222e; }
    </style>
</head>
<body>

    <div class="wrapper">
        <main class="markdown-body">
            {{ content }}
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Diccionario con tus SVGs modificados
            const alerts = {
                'NOTE': { 
                    icon: '<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#0969da" style="margin-right: 8px; flex-shrink: 0;"><path d="M503.5-289.48q9.5-9.48 9.5-23.5t-9.48-23.52q-9.48-9.5-23.5-9.5t-23.52 9.48q-9.5 9.48-9.5 23.5t9.48 23.52q9.48 9.5 23.5 9.5t23.52-9.48ZM453-433h60v-253h-60v253Zm27.27 353q-82.74 0-155.5-31.5Q252-143 197.5-197.5t-86-127.34Q80-397.68 80-480.5t31.5-155.66Q143-709 197.5-763t127.34-85.5Q397.68-880 480.5-880t155.66 31.5Q709-817 763-763t85.5 127Q880-563 880-480.27q0 82.74-31.5 155.5Q817-252 763-197.68q-54 54.31-127 86Q563-80 480.27-80Zm.23-60Q622-140 721-239.5t99-241Q820-622 721.19-721T480-820q-141 0-240.5 98.81T140-480q0 141 99.5 240.5t241 99.5Zm-.5-340Z"/></svg>', 
                    class: 'markdown-alert-note' 
                },
                'TIP': { 
                    icon: '<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1a7f37" style="margin-right: 8px; flex-shrink: 0;"><path d="M422.5-103.5Q399-127 399-161h162q0 34-23.5 57.5T480-80q-34 0-57.5-23.5ZM318-223v-60h324v60H318Zm5-121q-66-43-104.5-107.5T180-597q0-122 89-211t211-89q122 0 211 89t89 211q0 81-38 145.5T637-344H323Zm22-60h271q48-32 76-83t28-110q0-99-70.5-169.5T480-837q-99 0-169.5 70.5T240-597q0 59 28 110t77 83Zm135 0Z"/></svg>', 
                    class: 'markdown-alert-tip' 
                },
                'IMPORTANT': { 
                    icon: '<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#8250df" style="margin-right: 8px; flex-shrink: 0;"><path d="M479.98-367q14.02 0 23.52-9.48t9.5-23.5q0-14.02-9.48-23.52t-23.5-9.5q-14.02 0-23.52 9.48t-9.5 23.5q0 14.02 9.48 23.52t23.5 9.5ZM450-509h60v-251h-60v251ZM80-80v-740q0-24 18-42t42-18h680q24 0 42 18t18 42v520q0 24-18 42t-42 18H240L80-80Zm134-220h606v-520H140v600l74-80Zm-74 0v-520 520Z"/></svg>', 
                    class: 'markdown-alert-important' 
                },
                'WARNING': { 
                    icon: '<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#9a6700" style="margin-right: 8px; flex-shrink: 0;"><path d="m40-120 440-760 440 760H40Zm104-60h672L480-760 144-180Zm361.5-65.68q8.5-8.67 8.5-21.5 0-12.82-8.68-21.32-8.67-8.5-21.5-8.5-12.82 0-21.32 8.68-8.5 8.67-8.5 21.5 0 12.82 8.68 21.32 8.67 8.5 21.5 8.5 12.82 0 21.32-8.68ZM454-348h60v-224h-60v224Zm26-122Z"/></svg>', 
                    class: 'markdown-alert-warning' 
                },
                'CAUTION': { 
                    icon: '<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#cf222e" style="margin-right: 8px; flex-shrink: 0;"><path d="M480-281q14 0 24.5-10.5T515-316q0-14-10.5-24.5T480-351q-14 0-24.5 10.5T445-316q0 14 10.5 24.5T480-281Zm-30-144h60v-263h-60v263ZM330-120 120-330v-300l210-210h300l210 210v300L630-120H330Zm25-60h250l175-175v-250L605-780H355L180-605v250l175 175Zm125-300Z"/></svg>', 
                    class: 'markdown-alert-caution' 
                }
            };

            // Interceptar lo que Kramdown (Jekyll) procesó como blockquote estándar
            document.querySelectorAll('.markdown-body blockquote p').forEach(p => {
                const text = p.textContent.trim();
                const match = text.match(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]/);
                
                if (match) {
                    const type = match[1];
                    const alert = alerts[type];
                    const blockquote = p.parentElement;
                    
                    // Crear estructura contenedora del Alert
                    const div = document.createElement('div');
                    div.className = `markdown-alert ${alert.class}`;
                    
                    const title = document.createElement('p');
                    title.className = 'markdown-alert-title';
                    title.innerHTML = `${alert.icon}${type}`;
                    
                    // Limpiar la etiqueta de control "[!TIPO]" del nodo de texto
                    p.innerHTML = p.innerHTML.replace(/^\[!.*?\]\s*/, '');
                    
                    div.appendChild(title);
                    
                    // Mover de forma segura todo el contenido HTML interno (por si hay más párrafos, enlaces, etc.)
                    while (blockquote.firstChild) {
                        div.appendChild(blockquote.firstChild);
                    }
                    
                    // Reemplazo limpio en el DOM
                    blockquote.parentNode.replaceChild(div, blockquote);
                }
            });
        });
    </script>
</body>
</html>
