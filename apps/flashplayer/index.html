<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashPlayer by ElmichiYT</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="robots" content="noindex">
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evitar scroll */
            background-color: #000; /* Fondo negro opcional */
        }
        
        #flash-content {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #error-message {
            position: absolute;
            color: white;
            font-size: 2em;
            text-align: center;
            display: none; /* Ocultar inicialmente */
        }
        
        ruffle-player {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>
</head>
<body>
    <div id="flash-content">
        <div id="error-message">Archivo .SWF no encontrado!</div>
    </div>
    
    <script>
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        
        player.style.width = "100%";
        player.style.height = "100%";
        
        document.getElementById("flash-content").appendChild(player);

        const urlParams = new URLSearchParams(window.location.search);
        const swfFile = urlParams.get('get');

        if (swfFile) {
            player.load(swfFile); 
        } else {
            document.getElementById("error-message").style.display = "block";
        }
        
        function enterFullscreen() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            } else if (document.documentElement.msRequestFullscreen) {
                document.documentElement.msRequestFullscreen();
            }
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'f' || e.key === 'F11') {
                enterFullscreen();
            }
        });
    </script>
</body>
</html>
