<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassiCube Player Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Extractor de ClassiCube</h1>
        <div class="search-box">
            <input type="text" id="username" placeholder="Escribe el usuario...">
            <button id="fetch-btn">Buscar</button>
        </div>

        <div id="result" class="result-card hidden">
            <h2 id="res-name"></h2>
            <p><strong>ID:</strong> <span id="res-id"></span></p>
            <p><strong>Registrado:</strong> <span id="res-registered"></span></p>
            <p><strong>Estado:</strong> <span id="res-flags"></span></p>
        </div>

        <p id="error-msg" class="error hidden">Usuario no encontrado o error de API.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
