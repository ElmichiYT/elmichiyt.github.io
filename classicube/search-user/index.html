<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassiCube Player Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>ClassiCube Player Lookup</h1>
        <div class="search-area">
            <input type="text" id="usernameInput" placeholder="Nombre de usuario...">
            <button id="searchBtn">Buscar</button>
        </div>
    </header>

    <main id="mainContent">
        <p id="errorMsg" class="error-text" style="display: none;"></p>

        <section id="resultCard" class="info-card" style="display: none;">
            <div class="info-header">
        		<img id="res-avatar" src="" alt="" class="player-face" style="display: none;">
                <h2 id="res-username"></h2>
                <span id="res-id" class="id-tag"></span>
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <label>Cuenta Premium</label>
                    <span id="res-premium"></span>
                </div>
                <div class="info-item">
                    <label>Fecha de registro</label>
                    <span id="res-registered"></span>
                </div>
                <div class="info-item">
                    <label>Flags</label>
                    <span id="res-flags"></span>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
