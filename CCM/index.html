<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassiCube Messenger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <audio id="notif-sound" src="noti.mp3" preload="auto"></audio>

    <div id="login-screen">
        <div class="auth-card">
            <h1>Bienvenido</h1>
            <input type="text" id="nickname" placeholder="Apodo">
            <input type="email" id="email" placeholder="Correo">
            <input type="password" id="pass" placeholder="Contraseña">
            <button id="btnEntrar">Entrar</button>
            <button id="btnRegistro" class="secondary">Crear cuenta</button>
        </div>
    </div>

    <header>
        <div class="header-content">
            <b>CLASSICUBE GLOBAL</b>
            <div class="actions">
                <select id="theme-selector">
                    <option value="system">Sistema</option>
                    <option value="light">Claro</option>
                    <option value="dark">Oscuro</option>
                </select>
                <button id="btnSalir">Salir</button>
            </div>
        </div>
    </header>

    <main id="chat"></main>

    <div id="input-container" class="hidden">
        <div id="typing-area"></div>
        <div class="input-bar">
            <div class="dropdown">
                <button id="btnMenu" type="button">+</button>
                <div id="fileMenu" class="dropdown-content">
                    <button onclick="promptMedia('video')">📹 Video (URL)</button>
                    <button onclick="promptMedia('audio')">🎵 Audio (URL)</button>
                    <button onclick="promptMedia('image')">🖼️ Imagen (URL)</button>
                    <button onclick="promptMedia('other')">📁 Archivo (URL)</button>
                </div>
            </div>
            <textarea id="mensaje" placeholder="Escribe... (Shift+Enter salto)" rows="1"></textarea>
            <button id="btnEnviar">➤</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
