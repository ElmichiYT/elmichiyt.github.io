<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassiCube Messenger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="login-screen">
        <div class="auth-card">
            <h2>ClassiCube Messenger</h2>
            <input type="text" id="nickname" placeholder="Apodo">
            <input type="email" id="email" placeholder="Correo">
            <input type="password" id="pass" placeholder="Contraseña">
            <button id="btnEntrar">Iniciar Sesión</button>
            <button id="btnRegistro">Crear Cuenta (Verifica correo)</button>
        </div>
    </div>

    <header>
        <span>CLASSICUBE CHAT</span>
        <div>
            <select id="theme-selector">
                <option value="light">Claro</option>
                <option value="dark">Oscuro</option>
                <option value="system">Sistema</option>
            </select>
            <button id="btnSalir">Salir</button>
        </div>
    </header>

    <div id="chat"></div>
    <div id="input-area" class="hidden">
        <textarea id="mensaje" placeholder="Escribe... (Shift+Enter para salto)" rows="1"></textarea>
        <button id="btnEnviar">Enviar</button>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
